<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashflow254 Checkout</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #00cc66;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #00b359;
        }
        #status {
            margin-top: 20px;
            text-align: center;
            font-weight: 500;
        }
        .success { color: #00b359; }
        .error { color: #ff3333; }
    </style>
</head>
<body>

<div class="card">
    <h2>Cashflow254 Payment</h2>
    <form id="paymentForm">
        <div class="form-group">
            <label for="phone">M-Pesa Phone Number</label>
            <input type="text" id="phone" placeholder="e.g. 254712345678" required>
        </div>
        <div class="form-group">
            <label for="amount">Amount (KES)</label>
            <input type="number" id="amount" placeholder="e.g. 10" required>
        </div>
        <button type="submit" id="payBtn">Pay Now</button>
    </form>
    <div id="status"></div>
</div>

<script>
    document.getElementById('paymentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const phone = document.getElementById('phone').value;
        const amount = document.getElementById('amount').value;
        const statusDiv = document.getElementById('status');
        const payBtn = document.getElementById('payBtn');

        statusDiv.innerText = "Sending STK Push prompt...";
        statusDiv.className = "";
        payBtn.disabled = true;

        try {
            const response = await fetch('/api/stkpush', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone_number: phone, amount: amount })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                statusDiv.innerText = "STK Push sent successfully! Check your phone to enter PIN.";
                statusDiv.className = "success";
            } else {
                statusDiv.innerText = "Error: " + (data.error || "Failed to trigger push.");
                statusDiv.className = "error";
            }
        } catch (err) {
            statusDiv.innerText = "Network error occurred.";
            statusDiv.className = "error";
        } finally {
            payBtn.disabled = false;
        }
    });
</script>

</body>
</html>
