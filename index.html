<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashflow254 Gateway</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: white; margin: 0; padding: 20px; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .payment-box { background: #1e293b; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 380px; border: 1px solid #334155; }
        h2 { margin-top: 0; text-align: center; color: #38bdf8; font-size: 24px; }
        label { display: block; margin: 15px 0 5px; font-size: 14px; color: #94a3b8; }
        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #475569; border-radius: 8px; color: white; font-size: 16px; box-sizing: border-box; }
        input:focus { outline: none; border-color: #38bdf8; }
        button { width: 100%; background: #0284c7; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 20px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #0369a1; }
        #alert { margin-top: 15px; text-align: center; font-size: 14px; font-weight: 500; display: none; padding: 10px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="payment-box">
    <h2>Cashflow254</h2>
    <form id="stkForm">
        <label>M-Pesa Phone Number</label>
        <input type="text" id="phone" placeholder="e.g. 0712345678 or 254..." required>

        <label>Amount (KES)</label>
        <input type="number" id="amount" min="10" placeholder="Amount to charge" required>

        <button type="submit">Request STK Push</button>
    </form>
    <div id="alert"></div>
</div>

<script>
    document.getElementById('stkForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const alertBox = document.getElementById('alert');
        
        alertBox.style.display = 'block';
        alertBox.style.background = '#334155';
        alertBox.style.color = '#38bdf8';
        alertBox.innerText = 'Connecting to IntaSend...';

        const phoneNumber = document.getElementById('phone').value;
        const amount = document.getElementById('amount').value;

        try {
            const res = await fetch('/api/pay/mpesa', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phoneNumber, amount })
            });
            const feedback = await res.json();

            if (feedback.success) {
                alertBox.style.background = '#064e3b';
                alertBox.style.color = '#34d399';
                alertBox.innerText = 'STK Push sent successfully! Check your phone for the PIN prompt.';
            } else {
                alertBox.style.background = '#7f1d1d';
                alertBox.style.color = '#f87171';
                alertBox.innerText = 'Failed: ' + (feedback.error || 'Check payment parameters');
            }
        } catch (err) {
            alertBox.style.background = '#7f1d1d';
            alertBox.style.color = '#f87171';
            alertBox.innerText = 'Network connection problem.';
        }
    });
</script>
</body>
</html>
